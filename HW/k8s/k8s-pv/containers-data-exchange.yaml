apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-exchange
  labels:
    app: data-exchange
    task: task_1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-exchange
  template:
    metadata:
      labels:
        app: data-exchange
    spec:
      containers:
        - name: busybox
          image: busybox:1.28
          args:
          - /bin/sh
          - -c
          - >
            i=0;
            while true;
            do
              echo "$i: $(date)" >> /var/log/1.log;
              sleep 5; 
              i=$((i+1));
            done
          volumeMounts:
            - name: log-dir
              mountPath: /var/log
        - name: multitool
          image: wbitt/network-multitool
          command: ['sh', '-c', 'sleep infinity']
          volumeMounts:
            - name: log-dir
              mountPath: /var/log
              readOnly: True  
      volumes:
      - name: log-dir
        hostPath:
          path: /var/log
