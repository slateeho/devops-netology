version: '3.8'

services:
  influxdb:
    image: influxdb:1.8.10
    container_name: influxdb
    restart: always
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=telegraf
      - INFLUXDB_ADMIN_ENABLED=true
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g

  telegraf:
    image: telegraf:1.35
    user: telegraf:955
    container_name: telegraf
    restart: always
    privileged: true
    environment:
      - INFLUXDB_URL=http://influxdb:8086
    volumes:
      - ./etc/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:Z
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "8092:8092/udp"
      - "8094:8094"
      - "8125:8125/udp"
    mem_limit: 512m

  chronograf:
    image: chronograf:1.8.10
    container_name: chronograf
    restart: always
    privileged: true
    ports:
      - "8888:8888"
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_USERNAME=admin
      - INFLUXDB_PASSWORD=admin
    depends_on:
      - influxdb
    mem_limit: 512m

  kapacitor:
    image: kapacitor:1.5.9
    container_name: kapacitor
    restart: always
    privileged: true
    ports:
      - "9092:9092"
    environment:
      - KAPACITOR_INFLUXDB_URLS=http://influxdb:8086
    depends_on:
      - influxdb
    mem_limit: 512m

volumes:
  influxdb-data:
