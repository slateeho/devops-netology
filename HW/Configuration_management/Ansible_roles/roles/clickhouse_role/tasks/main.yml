---
- name: Get clickhouse distrib
  when: ansible_facts['os_family'] == "RedHat"
  tags:
    - clickhouse
  block:
    - name: Download clickhouse packages
      ansible.builtin.get_url:
        url: "https://packages.clickhouse.com/rpm/stable/{{ item }}-{{ clickhouse_version }}.x86_64.rpm"
        dest: "./{{ item }}-{{ clickhouse_version }}.rpm"
        mode: '0644'
      with_items: "{{ clickhouse_packages }}"
      tags:
        - clickhouse
  rescue:
    - name: Get clickhouse distrib fallback
      ansible.builtin.get_url:
        url: "https://packages.clickhouse.com/rpm/stable/clickhouse-common-static-{{ clickhouse_version }}.x86_64.rpm"
        dest: "./clickhouse-common-static-{{ clickhouse_version }}.rpm"
        mode: '0644'
      tags:
        - clickhouse

- name: Install python3-dnf on CentOS
  ansible.builtin.raw: dnf install -y python3-dnf
  when: ansible_facts['distribution'] == "CentOS"
  tags:
    - clickhouse

- name: Install clickhouse packages (RPM)
  become: true
  tags:
    - clickhouse
  ansible.builtin.dnf:
    name:
      - clickhouse-common-static-{{ clickhouse_version }}.rpm
      - clickhouse-client-{{ clickhouse_version }}.rpm
      - clickhouse-server-{{ clickhouse_version }}.rpm
    disable_gpg_check: true
  notify: Start clickhouse service
  when: ansible_facts['os_family'] == "RedHat"

- name: Install clickhouse (Arch)
  become: true
  ansible.builtin.shell: curl https://clickhouse.com/ | sh && ./clickhouse install
  args:
    creates: /usr/bin/clickhouse
  when: ansible_facts['os_family'] == "Archlinux"
  notify: Start clickhouse service
  tags:
    - clickhouse

- name: Add ClickHouse repo (Debian/Ubuntu)
  become: true
  ansible.builtin.shell: |
    apt-get install -y apt-transport-https ca-certificates curl gnupg
    curl -fsSL 'https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key' | gpg --dearmor -o /usr/share/keyrings/clickhouse-keyring.gpg
    echo "deb [signed-by=/usr/share/keyrings/clickhouse-keyring.gpg] https://packages.clickhouse.com/deb stable main" > /etc/apt/sources.list.d/clickhouse.list
    apt-get update
  when: ansible_facts['os_family'] == "Debian"
  changed_when: true
  tags:
    - clickhouse

- name: Install clickhouse packages (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    name:
      - clickhouse-server
      - clickhouse-client
      - clickhouse-common-static
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: ansible_facts['os_family'] == "Debian"
  notify: Start clickhouse service
  tags:
    - clickhouse

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags:
    - clickhouse

- name: Wait for clickhouse to be ready
  ansible.builtin.wait_for:
    port: 9000
    delay: 2
    timeout: 30
  tags:
    - clickhouse

- name: Create database
  ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
  register: create_db
  failed_when: create_db.rc != 0 and create_db.rc != 82
  changed_when: create_db.rc == 0
  tags:
    - clickhouse
