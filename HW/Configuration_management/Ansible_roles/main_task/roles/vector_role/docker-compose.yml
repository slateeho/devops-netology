version: '3.8'

services:
  vector:
    build: .
    container_name: vector
    environment:
      VECTOR_MEMORY_LIMIT: ${VECTOR_MEMORY_LIMIT:-512Mi}
      VECTOR_CPU_LIMIT: ${VECTOR_CPU_LIMIT:-1000m}
      VECTOR_LOG_DIR: ${VECTOR_LOG_DIR:-/var/log/vector}
      VECTOR_CONFIG_DIR: ${VECTOR_CONFIG_DIR:-/etc/vector}
      VECTOR_BIN: ${VECTOR_BIN:-/usr/local/bin/vector}
      TELEMETRY_ADDRESS: ${TELEMETRY_ADDRESS:-0.0.0.0:8686}
      LOKI_ENDPOINT: ${LOKI_ENDPOINT:-http://loki:${LOKI_PORT:-3100}/loki/api/v1/push}
      ELASTICSEARCH_ENDPOINT: ${ELASTICSEARCH_ENDPOINT:-http://elasticsearch:${ELASTICSEARCH_PORT:-9200}}
    volumes:
      - ./vector.toml:/etc/vector/vector.toml:ro
      - ${VECTOR_LOGS_VOLUME:-vector_logs}:/var/log/vector
      - ${VECTOR_CONFIG_VOLUME:-vector_config}:/etc/vector

volumes:
  vector_config:
  vector_logs:
