---

- name: Load OS-specific nginx variables
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] }}.yml"
  tags: lighthouse

- name: Remove pacman lock file
  become: true
  ansible.builtin.file:
    path: /var/lib/pacman/db.lck
    state: absent
  ignore_errors: true
  tags: lighthouse

- name: Create nginx group
  become: true
  ansible.builtin.group:
    name: "{{ nginx_user }}"
    state: present
    system: yes
  tags: lighthouse

- name: Create nginx user
  become: true
  ansible.builtin.user:
    name: "{{ nginx_user }}"
    shell: /usr/sbin/nologin
    home: /var/cache/nginx
    createhome: no
    group: "{{ nginx_user }}"
  tags: lighthouse

- name: Install nginx
  become: true
  ansible.builtin.package:
    name: nginx
    state: present
  tags: lighthouse

- name: Create nginx conf directory
  become: true
  ansible.builtin.file:
    path: "{{ nginx_conf_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  tags: lighthouse

- name: Remove default nginx site (Debian)
  become: true
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: ansible_facts['os_family'] == "Debian"
  tags: lighthouse

- name: Comment out default server block in nginx.conf
  become: true
  ansible.builtin.replace:
    path: /etc/nginx/nginx.conf
    regexp: '(?s)(^\s{4}server\s*\{.*?^\s{4}\})'
    replace: '# default server block removed by lighthouse role'
  when: ansible_facts['os_family'] != "RedHat"
  tags: lighthouse

- name: Remove old default.conf if present
  become: true
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  when: nginx_conf_file != "/etc/nginx/conf.d/default.conf"
  tags: lighthouse

- name: Create nginx config
  become: true
  ansible.builtin.template:
    src: default.conf.j2
    dest: "{{ nginx_conf_file }}"
    mode: '0644'
  notify: Start nginx service
  tags: lighthouse

- name: Create nginx systemd unit
  become: true
  ansible.builtin.template:
    src: nginx.service.j2
    dest: /etc/systemd/system/nginx.service
    mode: '0644'
  when: systemd_running | default(false)
  tags: lighthouse

- name: Create nginx init.d script
  become: true
  ansible.builtin.template:
    src: nginx.init.j2
    dest: /etc/init.d/nginx
    mode: '0755'
  when: not (systemd_running | default(false))
  tags: lighthouse

- name: Start and enable nginx (systemd)
  become: true
  ansible.builtin.systemd:
    name: nginx
    enabled: yes
    state: started
    daemon_reload: true
  when: systemd_running | default(false)
  tags: lighthouse

- name: Start nginx directly (no systemd)
  become: true
  ansible.builtin.shell: |
    nginx -t 2>&1 && (nginx -s stop 2>/dev/null || true) && nginx
  when: not (systemd_running | default(false))
  changed_when: true
  tags: lighthouse

- name: Nginx - Flush handlers
  ansible.builtin.meta: flush_handlers
  tags: lighthouse
