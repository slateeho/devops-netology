---
- name: Converge
  hosts: all:!localhost
  gather_facts: true
  vars:
    docker: false
    helm: false
  pre_tasks:
    - name: Check if systemd is running
      ansible.builtin.stat:
        path: /run/systemd/system
      register: systemd_check

    - name: Set systemd_running fact
      ansible.builtin.set_fact:
        systemd_running: "{{ systemd_check.stat.exists | default(false) }}"
  roles:
    - clickhouse_role
    - vector_role
    - lighthouse
