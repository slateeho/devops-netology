- name: ClickHouse deps
  become: true
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes
  when:
    - ansible_facts['os_family'] == "Debian"
  tags: clickhouse

- name: Ensure keyring directory exists
  become: true
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: '0755'
  when: ansible_facts['distribution'] in ['Debian', 'Ubuntu']
  tags:
    - clickhouse

- name: Check for existing ClickHouse keyring
  become: true
  ansible.builtin.stat:
    path: /usr/share/keyrings/clickhouse-keyring.gpg
  register: clickhouse_keyring
  when: ansible_facts['distribution'] in ['Debian', 'Ubuntu']
  tags:
    - clickhouse

- name: Install ClickHouse keyring if missing
  become: true
  ansible.builtin.shell: |
    curl -fsSL 'https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key' | gpg --dearmor -o /usr/share/keyrings/clickhouse-keyring.gpg
  when:
    - ansible_facts['distribution'] in ['Debian', 'Ubuntu']
    - not clickhouse_keyring.stat.exists
  register: add_key
  failed_when: add_key.rc != 0
  changed_when: add_key.rc == 0
  tags:
    - clickhouse

- name: Ensure ClickHouse repo file contains correct line
  become: true
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/clickhouse.list
    line: "deb [signed-by=/usr/share/keyrings/clickhouse-keyring.gpg] https://packages.clickhouse.com/deb stable main"
    create: yes
  when: ansible_facts['distribution'] in ['Debian', 'Ubuntu']
  register: repo_line
  tags:
    - clickhouse

- name: Update apt cache when repo changed
  become: true
  ansible.builtin.apt:
    update_cache: yes
  when:
    - ansible_facts['distribution'] in ['Debian', 'Ubuntu']
    - repo_line.changed or (add_key is defined and add_key.changed)
  tags:
    - clickhouse


- name: Install clickhouse packages (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    name:
      - clickhouse-server
      - clickhouse-client
      - clickhouse-common-static
    state: present
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: ansible_facts['os_family'] == "Debian"
  notify: Start clickhouse service
  tags:
    - clickhouse

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags:
    - clickhouse

- name: Wait for clickhouse to be ready
  ansible.builtin.wait_for:
    port: 9000
    delay: 2
    timeout: 30
  tags:
    - clickhouse

- name: Create database
  ansible.builtin.command: "clickhouse-client -q 'create database logs;'"
  register: create_db
  failed_when: create_db.rc != 0 and create_db.rc != 82
  changed_when: create_db.rc == 0
  tags:
    - clickhouse
