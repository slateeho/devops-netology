---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: centos8
    image: docker.io/pycontribs/centos:8
    pre_build_image: true

provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
  config_options:
    defaults:
      remote_tmp: /tmp/.ansible

verifier:
  name: ansible
