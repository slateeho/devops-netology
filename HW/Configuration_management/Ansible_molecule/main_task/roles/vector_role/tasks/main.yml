---

# Ensure centos user exists (RedHat only)
- name: Create centos user if not exists
  become: true
  ansible.builtin.user:
    name: centos
    state: present
    shell: /bin/bash
    home: /home/centos
    create_home: yes

# Ensure wget exists
- name: Check if wget exists
  ansible.builtin.command: wget --version
  register: wget_check
  changed_when: false
  failed_when: false
  tags: [always]

- name: Install wget when missing
  become: true
  ansible.builtin.package:
    name: wget
    state: present
  when: wget_check.rc != 0
  tags: [always]

# Check Vector setup script availability
- name: Check vector setup script availability
  ansible.builtin.command: wget --spider "{{ vector_setup_script }}"
  register: vector_script_check
  changed_when: false
  failed_when: false
  tags: [always]

# ────────────────────────────────────────────────────────────────
# Install Vector on HOST (NO DOCKER, NO HELM)
# ────────────────────────────────────────────────────────────────

- name: Install Vector on host
  when: not (docker | default(false)) and not (helm | default(false))
  tags: [systemd-vector]
  block:

    # Check if vector already installed
    - name: Check if vector is installed
      ansible.builtin.command: which vector
      register: vector_check
      changed_when: false
      failed_when: false

    # Debian / Ubuntu
    - name: Install Vector on Debian/Ubuntu
      when:
        - ansible_facts['os_family'] == "Debian"
        - vector_check.rc != 0
      block:
        - name: Download Vector setup script (Debian/Ubuntu)
          ansible.builtin.get_url:
            url: "https://setup.vector.dev"
            dest: /tmp/vector-setup.sh
            mode: '0755'

        - name: Run Vector setup script (Debian/Ubuntu)
          become: true
          ansible.builtin.command: /tmp/vector-setup.sh --yes
          args:
            creates: "{{ vector_bin | default('/usr/bin/vector') }}"

        - name: Install vector package (Debian/Ubuntu)
          become: true
          ansible.builtin.apt:
            name: vector
            state: present
            update_cache: yes

    # RedHat / CentOS / Fedora
    - name: Install Vector on RedHat family
      when:
        - ansible_facts['os_family'] == "RedHat"
        - vector_check.rc != 0
      block:
        - name: Download Vector setup script (RedHat)
          ansible.builtin.get_url:
            url: "https://setup.vector.dev"
            dest: /tmp/vector-setup.sh
            mode: '0755'

        - name: Run Vector setup script (RedHat)
          become: true
          ansible.builtin.command: /tmp/vector-setup.sh --yes
          args:
            creates: "{{ vector_bin | default('/usr/bin/vector') }}"

        - name: Install vector package (RedHat)
          become: true
          ansible.builtin.package:
            name: vector
            state: present

    # Arch Linux
    - name: Install Vector on Arch
      become: true
      community.general.pacman:
        name: vector
        state: present
      when:
        - ansible_facts['os_family'] == "Archlinux"
        - vector_check.rc != 0

# ────────────────────────────────────────────────────────────────
# Create directories
# ────────────────────────────────────────────────────────────────

- name: Create vector config directory
  become: true
  tags: [systemd-vector]
  ansible.builtin.file:
    path: "{{ vector_config_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ 'centos' if ansible_facts['os_family'] == 'RedHat' else 'root' }}"
    group: "{{ 'centos' if ansible_facts['os_family'] == 'RedHat' else 'root' }}"
  when: not (docker | default(false)) and not (helm | default(false))

- name: Create vector log directory
  become: true
  tags: [systemd-vector]
  ansible.builtin.file:
    path: "{{ vector_log_dir }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  when: not (docker | default(false)) and not (helm | default(false))

# ────────────────────────────────────────────────────────────────
# Build list of log source directories
# ────────────────────────────────────────────────────────────────

- name: Build list of log source directories (safe, unique)
  ansible.builtin.set_fact:
    log_source_dirs: >-
      {{ [
          (syslog_files[0]     | default('')),
          (nginx_access_logs[0]| default('')),
          (postgres_logs[0]    | default('')),
          (redis_logs[0]       | default(''))
        ]
        | map('regex_replace', '/[^/]*$','')
        | reject('equalto','')
        | list
        | unique }}
  changed_when: false
  tags: [vector]

- name: Ensure log source directories exist
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop: "{{ log_source_dirs }}"
  when:
    - not (docker | default(false))
    - not (helm | default(false))
    - log_source_dirs | length > 0
  tags: [vector]

# ────────────────────────────────────────────────────────────────
# Final status
# ────────────────────────────────────────────────────────────────

- name: Check Vector is running
  ansible.builtin.command: pgrep -a vector
  register: vector_status
  changed_when: false
  failed_when: false

- name: Show Vector status
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} ({{ ansible_facts['os_family'] }}): {{ vector_status.stdout | default('vector not running') }}"
