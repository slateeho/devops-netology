---
dependency:
  name: galaxy
  options:
    requirements-file: ../requirements.yml

driver:
  name: docker

platforms:
  - name: debian
    image: debian:12
    pre_build_image: true
  - name: ubuntu
    image: ubuntu:22.04
    pre_build_image: true
  - name: centos
    image: centos:8
    pre_build_image: true
  - name: fedora
    image: fedora:39
    pre_build_image: true
  - name: arch
    image: archlinux:latest
    pre_build_image: true

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    destroy: destroy.yml

scenario:
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
